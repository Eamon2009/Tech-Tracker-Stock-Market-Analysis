<!DOCTYPE html>
<html>

<head>

       <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
       <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#050505] text-white flex">

       <aside class="w-72 bg-[#0a0a0a] border-r border-gray-900 p-6">

              <h1 class="text-2xl font-bold text-green-400 mb-10">
                     TECH TRACKER
              </h1>

              <div id="companyList"></div>

       </aside>


       <main class="flex-1 p-10">

              <div class="mb-6 flex gap-4">

                     <button onclick="showUnified()" class="bg-gray-800 px-4 py-2 rounded">
                            Unified Chart
                     </button>

              </div>

              <div class="bg-[#0a0a0a] p-6 rounded-xl border border-gray-900 mb-10">

                     <h3 class="text-gray-400 mb-4">Price + Moving Averages</h3>

                     <canvas id="priceChart"></canvas>

              </div>


              <div class="bg-[#0a0a0a] p-6 rounded-xl border border-gray-900">

                     <h3 class="text-gray-400 mb-4">Return Distribution</h3>

                     <canvas id="histChart"></canvas>

              </div>

       </main>

       <script src="app.js"></script>

</body>

</html>
