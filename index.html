<!DOCTYPE html>
<html lang="en">

<head>

       <meta charset="UTF-8">

       <title>Tech Tracker</title>

       <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

       <script src="https://cdn.tailwindcss.com"></script>

</head>


<body class="bg-gray-950 text-white flex h-screen overflow-hidden">


       <aside class="w-72 bg-gray-900 border-r border-gray-800 p-6 flex flex-col justify-between">

              <div>

                     <div class="text-2xl font-black text-emerald-400 mb-10">
                            TECH_TRACKER
                     </div>

                     <nav class="space-y-6">

                            <a class="text-emerald-400 font-bold">Dashboard</a>

                            <a class="text-gray-500 hover:text-white">Market News</a>

                            <a class="text-gray-500 hover:text-white">Settings</a>

                     </nav>

              </div>

              <div class="text-xs text-gray-400">
                     System Status: <span class="text-emerald-400">Live</span>
              </div>

       </aside>


       <main class="flex-1 p-8 overflow-y-auto">

              <header class="mb-10">

                     <h1 class="text-4xl font-bold">
                            Market Intelligence
                     </h1>

              </header>


              <div id="tickerCards" class="grid grid-cols-2 md:grid-cols-5 gap-6 mb-10">
              </div>


              <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">


                     <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 col-span-2">

                            <h3 class="text-gray-400 mb-4 text-xs font-bold uppercase">
                                   Price Trends
                            </h3>

                            <canvas id="lineChart"></canvas>

                     </div>


                     <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800">

                            <h3 class="text-gray-400 mb-4 text-xs font-bold uppercase">
                                   Market Distribution
                            </h3>

                            <canvas id="pieChart"></canvas>

                     </div>


                     <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800">

                            <h3 class="text-gray-400 mb-4 text-xs font-bold uppercase">
                                   Growth %
                            </h3>

                            <canvas id="barChart"></canvas>

                     </div>


              </div>

       </main>


       <script src="app.js"></script>

</body>

</html>
